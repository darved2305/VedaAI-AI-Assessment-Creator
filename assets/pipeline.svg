<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="200" fill="#ffffff"/>

  <!-- Step definitions: x, color, stroke, label, subtitle -->

  <!-- Step 1: Upload Doc -->
  <rect x="14" y="40" width="106" height="52" rx="8" fill="#dbe4ff" stroke="#4c6ef5" stroke-width="2"/>
  <text x="67" y="63" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Upload Doc</text>
  <text x="67" y="79" text-anchor="middle" font-size="10" fill="#4c6ef5">PDF / text</text>
  <text x="67" y="115" text-anchor="middle" font-size="10" fill="#9ca3af">Teacher uploads</text>
  <text x="67" y="128" text-anchor="middle" font-size="10" fill="#9ca3af">source material</text>

  <!-- Arrow 1→2 -->
  <line x1="120" y1="66" x2="138" y2="66" stroke="#374151" stroke-width="2"/>
  <polygon points="138,62 146,66 138,70" fill="#374151"/>

  <!-- Step 2: Create Job -->
  <rect x="148" y="40" width="106" height="52" rx="8" fill="#fff3bf" stroke="#f59f00" stroke-width="2"/>
  <text x="201" y="63" text-anchor="middle" font-size="12" font-weight="700" fill="#7d5a00">Create Job</text>
  <text x="201" y="79" text-anchor="middle" font-size="10" fill="#e67700">POST /assignments</text>
  <text x="201" y="115" text-anchor="middle" font-size="10" fill="#9ca3af">Express validates</text>
  <text x="201" y="128" text-anchor="middle" font-size="10" fill="#9ca3af">+ creates assignment</text>

  <!-- Arrow 2→3 -->
  <line x1="254" y1="66" x2="272" y2="66" stroke="#374151" stroke-width="2"/>
  <polygon points="272,62 280,66 272,70" fill="#374151"/>

  <!-- Step 3: BullMQ Queue -->
  <rect x="282" y="40" width="106" height="52" rx="8" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2"/>
  <text x="335" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4d2e">BullMQ</text>
  <text x="335" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4d2e">Queue</text>
  <text x="335" y="115" text-anchor="middle" font-size="10" fill="#9ca3af">Redis-backed</text>
  <text x="335" y="128" text-anchor="middle" font-size="10" fill="#9ca3af">retry + backoff</text>

  <!-- Arrow 3→4 -->
  <line x1="388" y1="66" x2="406" y2="66" stroke="#374151" stroke-width="2"/>
  <polygon points="406,62 414,66 406,70" fill="#374151"/>

  <!-- Step 4: Worker Picks Up -->
  <rect x="416" y="40" width="106" height="52" rx="8" fill="#e5dbff" stroke="#7950f2" stroke-width="2"/>
  <text x="469" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#3b1f8c">Worker</text>
  <text x="469" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="#3b1f8c">Picks Up</text>
  <text x="469" y="115" text-anchor="middle" font-size="10" fill="#9ca3af">paper · refine</text>
  <text x="469" y="128" text-anchor="middle" font-size="10" fill="#9ca3af">variant · blooms</text>

  <!-- Arrow 4→5 -->
  <line x1="522" y1="66" x2="540" y2="66" stroke="#374151" stroke-width="2"/>
  <polygon points="540,62 548,66 540,70" fill="#374151"/>

  <!-- Step 5: LLM Generates -->
  <rect x="550" y="40" width="106" height="52" rx="8" fill="#ffc9c9" stroke="#fa5252" stroke-width="2"/>
  <text x="603" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">LLM</text>
  <text x="603" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Generates</text>
  <text x="603" y="115" text-anchor="middle" font-size="10" fill="#9ca3af">Groq streaming</text>
  <text x="603" y="128" text-anchor="middle" font-size="10" fill="#9ca3af">CBSE JSON schema</text>

  <!-- Arrow 5→6 -->
  <line x1="656" y1="66" x2="674" y2="66" stroke="#374151" stroke-width="2"/>
  <polygon points="674,62 682,66 674,70" fill="#374151"/>

  <!-- Step 6: Parse + Classify -->
  <rect x="684" y="40" width="106" height="52" rx="8" fill="#a5d8ff" stroke="#339af0" stroke-width="2"/>
  <text x="737" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#1864ab">Parse +</text>
  <text x="737" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="#1864ab">Classify</text>
  <text x="737" y="115" text-anchor="middle" font-size="10" fill="#9ca3af">Bloom&apos;s + Difficulty</text>
  <text x="737" y="128" text-anchor="middle" font-size="10" fill="#9ca3af">MongoDB write</text>

  <!-- Arrow 6→7 -->
  <line x1="790" y1="66" x2="808" y2="66" stroke="#374151" stroke-width="2"/>
  <polygon points="808,62 816,66 808,70" fill="#374151"/>

  <!-- Step 7: WebSocket Notify -->
  <rect x="818" y="40" width="68" height="52" rx="8" fill="#d0bfff" stroke="#7950f2" stroke-width="2"/>
  <text x="852" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#3b1f8c">WS</text>
  <text x="852" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#3b1f8c">Notify</text>
  <text x="852" y="115" text-anchor="middle" font-size="10" fill="#9ca3af">UI updates</text>
  <text x="852" y="128" text-anchor="middle" font-size="10" fill="#9ca3af">instantly</text>

  <!-- Bottom label -->
  <text x="450" y="170" text-anchor="middle" font-size="11" fill="#6b7280">
    Full pipeline: upload → validate → queue → generate → classify (Bloom&apos;s) → store → push to browser
  </text>
</svg>
