<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="480" fill="#ffffff" rx="8"/>

  <!-- Frontend zone -->
  <rect x="20" y="20" width="200" height="280" rx="10" fill="#dbe4ff" stroke="#4c6ef5" stroke-width="1.5"/>
  <text x="120" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Frontend</text>

  <rect x="36" y="58" width="168" height="36" rx="6" fill="#fff" stroke="#4c6ef5" stroke-width="1"/>
  <text x="120" y="72" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Next.js 14</text>
  <text x="120" y="86" text-anchor="middle" font-size="10" fill="#3b5bdb">TypeScript + App Router</text>

  <rect x="36" y="104" width="168" height="36" rx="6" fill="#fff" stroke="#4c6ef5" stroke-width="1"/>
  <text x="120" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Zustand Store</text>
  <text x="120" y="132" text-anchor="middle" font-size="10" fill="#3b5bdb">questionVersions · variants</text>

  <rect x="36" y="150" width="168" height="36" rx="6" fill="#fff" stroke="#4c6ef5" stroke-width="1"/>
  <text x="120" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">QuestionCard</text>
  <text x="120" y="178" text-anchor="middle" font-size="10" fill="#3b5bdb">Refine · BloomsBadge</text>

  <rect x="36" y="196" width="168" height="36" rx="6" fill="#fff" stroke="#4c6ef5" stroke-width="1"/>
  <text x="120" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">BloomsPanel</text>
  <text x="120" y="224" text-anchor="middle" font-size="10" fill="#3b5bdb">Donut chart · Rebalance</text>

  <rect x="36" y="242" width="168" height="36" rx="6" fill="#fff" stroke="#4c6ef5" stroke-width="1"/>
  <text x="120" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">VariantGrid</text>
  <text x="120" y="270" text-anchor="middle" font-size="10" fill="#3b5bdb">QR watermarks · ZIP export</text>

  <!-- Backend zone -->
  <rect x="255" y="20" width="230" height="280" rx="10" fill="#e5dbff" stroke="#7950f2" stroke-width="1.5"/>
  <text x="370" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#3b1f8c">Backend</text>

  <rect x="271" y="58" width="198" height="36" rx="6" fill="#fff" stroke="#7950f2" stroke-width="1"/>
  <text x="370" y="72" text-anchor="middle" font-size="11" font-weight="600" fill="#5f3dc4">Express API</text>
  <text x="370" y="86" text-anchor="middle" font-size="10" fill="#7950f2">/assignments · /variants</text>

  <rect x="271" y="104" width="198" height="36" rx="6" fill="#fff" stroke="#7950f2" stroke-width="1"/>
  <text x="370" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#5f3dc4">WebSocket Server</text>
  <text x="370" y="132" text-anchor="middle" font-size="10" fill="#7950f2">broadcast() · typed events</text>

  <rect x="271" y="150" width="198" height="36" rx="6" fill="#fff" stroke="#7950f2" stroke-width="1"/>
  <text x="370" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#5f3dc4">BullMQ Workers</text>
  <text x="370" y="178" text-anchor="middle" font-size="10" fill="#7950f2">paper · refine · variant · blooms</text>

  <rect x="271" y="196" width="198" height="36" rx="6" fill="#fff" stroke="#7950f2" stroke-width="1"/>
  <text x="370" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="#5f3dc4">Bloom's Classifier</text>
  <text x="370" y="224" text-anchor="middle" font-size="10" fill="#7950f2">classifyBlooms() · rebalance</text>

  <rect x="271" y="242" width="198" height="36" rx="6" fill="#fff" stroke="#7950f2" stroke-width="1"/>
  <text x="370" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#5f3dc4">Variant Engine</text>
  <text x="370" y="270" text-anchor="middle" font-size="10" fill="#7950f2">shuffle · mutate · QR · ZIP</text>

  <!-- Storage zone -->
  <rect x="520" y="20" width="185" height="280" rx="10" fill="#d3f9d8" stroke="#2f9e44" stroke-width="1.5"/>
  <text x="612" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4d2e">Storage</text>

  <rect x="536" y="58" width="153" height="52" rx="6" fill="#fff" stroke="#2f9e44" stroke-width="1"/>
  <text x="612" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#2b8a3e">MongoDB</text>
  <text x="612" y="92" text-anchor="middle" font-size="10" fill="#2f9e44">Assignment · Paper</text>
  <text x="612" y="104" text-anchor="middle" font-size="10" fill="#2f9e44">questionVersions · bloomsDist</text>

  <rect x="536" y="120" width="153" height="52" rx="6" fill="#fff" stroke="#2f9e44" stroke-width="1"/>
  <text x="612" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#2b8a3e">Redis</text>
  <text x="612" y="154" text-anchor="middle" font-size="10" fill="#2f9e44">BullMQ queues</text>
  <text x="612" y="166" text-anchor="middle" font-size="10" fill="#2f9e44">qv:{id}:{qId} · assignments:all</text>

  <rect x="536" y="182" width="153" height="36" rx="6" fill="#fff" stroke="#2f9e44" stroke-width="1"/>
  <text x="612" y="196" text-anchor="middle" font-size="11" font-weight="600" fill="#2b8a3e">File Storage</text>
  <text x="612" y="210" text-anchor="middle" font-size="10" fill="#2f9e44">uploads/ (PDF, images)</text>

  <rect x="536" y="228" width="153" height="36" rx="6" fill="#fff" stroke="#2f9e44" stroke-width="1"/>
  <text x="612" y="242" text-anchor="middle" font-size="11" font-weight="600" fill="#2b8a3e">Variant Cache</text>
  <text x="612" y="256" text-anchor="middle" font-size="10" fill="#2f9e44">ZIP buffers · QR payloads</text>

  <!-- AI Layer zone -->
  <rect x="730" y="20" width="155" height="280" rx="10" fill="#fff3bf" stroke="#f59f00" stroke-width="1.5"/>
  <text x="807" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#7d5a00">AI Layer</text>

  <rect x="746" y="58" width="123" height="52" rx="6" fill="#fff" stroke="#f59f00" stroke-width="1"/>
  <text x="807" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#e67700">Groq API</text>
  <text x="807" y="92" text-anchor="middle" font-size="10" fill="#f59f00">llama-3.3-70b</text>
  <text x="807" y="104" text-anchor="middle" font-size="10" fill="#f59f00">streaming enabled</text>

  <rect x="746" y="120" width="123" height="52" rx="6" fill="#fff" stroke="#f59f00" stroke-width="1"/>
  <text x="807" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#e67700">Paper Generator</text>
  <text x="807" y="154" text-anchor="middle" font-size="10" fill="#f59f00">CBSE-aligned prompts</text>
  <text x="807" y="166" text-anchor="middle" font-size="10" fill="#f59f00">Section A/B structure</text>

  <rect x="746" y="182" width="123" height="52" rx="6" fill="#fff" stroke="#f59f00" stroke-width="1"/>
  <text x="807" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#e67700">Refine Engine</text>
  <text x="807" y="216" text-anchor="middle" font-size="10" fill="#f59f00">per-question streaming</text>
  <text x="807" y="228" text-anchor="middle" font-size="10" fill="#f59f00">JSON schema output</text>

  <rect x="746" y="244" width="123" height="36" rx="6" fill="#fff" stroke="#f59f00" stroke-width="1"/>
  <text x="807" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#e67700">Bloom Classifier</text>
  <text x="807" y="270" text-anchor="middle" font-size="10" fill="#f59f00">6-level taxonomy</text>

  <!-- Arrows: Frontend → Backend (HTTP) -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#374151"/>
    </marker>
    <marker id="arr-ws" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#7950f2"/>
    </marker>
  </defs>

  <!-- HTTP arrows Frontend ↔ Backend -->
  <line x1="220" y1="100" x2="271" y2="100" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,2"/>
  <text x="245" y="96" text-anchor="middle" font-size="9" fill="#374151">HTTP</text>

  <!-- WebSocket arrows Backend ↔ Frontend -->
  <line x1="271" y1="140" x2="220" y2="140" stroke="#7950f2" stroke-width="1.5" marker-end="url(#arr-ws)" stroke-dasharray="4,2"/>
  <text x="245" y="156" text-anchor="middle" font-size="9" fill="#7950f2">WS events</text>

  <!-- Backend → Storage -->
  <line x1="485" y1="160" x2="520" y2="160" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Backend → AI -->
  <line x1="715" y1="160" x2="730" y2="160" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Legend -->
  <rect x="20" y="330" width="860" height="130" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="40" y="352" font-size="12" font-weight="700" fill="#111">Data Flow</text>

  <line x1="40" y1="375" x2="90" y2="375" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <text x="100" y="379" font-size="11" fill="#374151">Teacher creates assignment → Express queues BullMQ job → Worker calls Groq → Bloom's classifier runs</text>

  <line x1="40" y1="400" x2="90" y2="400" stroke="#7950f2" stroke-width="2" marker-end="url(#arr-ws)" stroke-dasharray="4,2"/>
  <text x="100" y="404" font-size="11" fill="#7950f2">WebSocket broadcasts: BLOOMS_CLASSIFIED · QUESTION_REFINE_TOKEN · VARIANT_PROGRESS → UI updates live</text>

  <line x1="40" y1="425" x2="90" y2="425" stroke="#2f9e44" stroke-width="2" marker-end="url(#arr)"/>
  <text x="100" y="429" font-size="11" fill="#2f9e44">Paper + question versions + Bloom's distribution stored in MongoDB · Redis caches hot paths (TTL 24h)</text>

  <text x="40" y="450" font-size="11" fill="#374151">Variant engine: pure algorithmic shuffle/mutate → QR Code (qrcode) → puppeteer PDF → archiver ZIP response</text>
</svg>
